# Test settings - uses mock components, no real credentials needed
server:
  env_name: test
  port: 8000

llm:
  mode: mock

embedding:
  mode: mock

vectorstore:
  mode: mock

rag:
  similarity_top_k: 3
  similarity_threshold: 0.7

# Mock values for test environment - these are not used with mock mode
local_llm:
  model_path: models/test-model.gguf
  context_length: 4096
  n_gpu_layers: 0
  max_tokens: 1024
  temperature: 0.7

huggingface:
  embedding_model: sentence-transformers/all-mpnet-base-v2

openai:
  api_key: test-key-not-used
  model: gpt-4o
  embedding_model: text-embedding-3-large
  api_base: https://api.openai.com/v1

anthropic:
  api_key: test-key-not-used
  model: claude-3-opus-20240229

postgres:
  host: localhost
  port: 5432
  user: test
  password: test
  database: test_rag_bench
  schema_name: public

pgvector:
  host: localhost
  port: 5432
  user: test
  password: test
  database: test_rag_bench
  schema_name: public
